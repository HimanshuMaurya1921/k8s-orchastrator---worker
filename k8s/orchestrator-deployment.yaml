apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: preview
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
      - name: orchestrator
        # REPLACE with your GCR/Artifact Registry image: gcr.io/PROJECT/orchestrator:latest
        # image: REPLACE_WITH_YOUR_REGISTRY_IMAGE
        image: orchestrator:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: preview-config
        - secretRef:
            name: preview-worker-secret
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: preview
spec:
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 3001
  type: LoadBalancer
