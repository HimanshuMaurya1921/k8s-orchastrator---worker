apiVersion: v1
kind: ConfigMap
metadata:
  name: preview-config
  namespace: preview
data:
  RUNTIME: "gke"
  WORKER_IMAGE: "preview-worker:local"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  SESSION_TTL_SECONDS: "1800"
  BOOT_TIMEOUT_MS: "90000"
  MAX_PREVIEW_PODS: "40"
  TERMINATION_GRACE_PERIOD_SECONDS: "30"
  JANITOR_PULSE_INTERVAL_MS: "10000"
  WORKSPACE: "/workspace"
  NODE_OPTIONS: "--max-old-space-size=800 --expose-gc"
